name: Daily AI Commit

on:
  schedule:
    - cron: "30 6 * * *"   # runs every day at 12:00 PM IST (6:30 UTC)
  workflow_dispatch:        # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONTENT_TIMEZONE: Asia/Kolkata
      GIT_AUTHOR_NAME: Gautam99-coder
      GIT_AUTHOR_EMAIL: ${{ secrets.GIT_EMAIL || 'Gautam99-coder@users.noreply.github.com' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily lesson
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: npm run generate

      - name: Commit and push content
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add content
          if git diff --cached --quiet; then
            echo "No content changes to commit."
            exit 0
          fi
          git commit -m "feat: daily DSA lesson $(TZ=Asia/Kolkata date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
